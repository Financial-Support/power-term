name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.platform.name }}
    strategy:
      matrix:
        platform:
          - name: macOS (aarch64)
            runs-on: macos-latest
            target: aarch64-apple-darwin
          - name: macOS (x86_64)
            runs-on: macos-latest
            target: x86_64-apple-darwin
          - name: Windows (x86_64)
            runs-on: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform.runs-on }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        id: tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.platform.target }}
          tagName: ${{ github.ref_name }}

  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Publish to public mirror
        env:
          PUBLIC_REPO: ${{ vars.PUBLIC_RELEASE_REPO }}
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          if [ -z "$PUBLIC_REPO" ]; then
            echo "PUBLIC_RELEASE_REPO variable not set — skipping mirror"
            exit 0
          fi
          echo "Mirroring release ${{ github.ref_name }} to $PUBLIC_REPO"
          # Download all artifacts from this release and push to public repo
          # Requires GH_TOKEN with write access to the public repo
          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --dir artifacts
          gh release create "${{ github.ref_name }}" \
            --repo "$PUBLIC_REPO" \
            --title "${{ github.ref_name }}" \
            --notes "Release ${{ github.ref_name }}" \
            artifacts/*
