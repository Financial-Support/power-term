name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.platform.name }}
    strategy:
      matrix:
        platform:
          - name: macOS (aarch64)
            runs-on: macos-latest
            target: aarch64-apple-darwin
          - name: macOS (x86_64)
            runs-on: macos-latest
            target: x86_64-apple-darwin
          - name: Windows (x86_64)
            runs-on: windows-latest
            target: x86_64-pc-windows-msvc
          - name: Linux (x86_64)
            runs-on: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform.runs-on }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Linux system dependencies
        if: matrix.platform.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            build-essential \
            libssl-dev \
            patchelf

      - name: Install dependencies
        run: npm install

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@action-v1.0.0
        id: tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          POWER_TERM_SUPABASE_URL: ${{ secrets.POWER_TERM_SUPABASE_URL }}
          POWER_TERM_SUPABASE_ANON_KEY: ${{ secrets.POWER_TERM_SUPABASE_ANON_KEY }}
        with:
          args: --target ${{ matrix.platform.target }}
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}

  cask:
    name: Update Homebrew cask
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tap repo
        uses: actions/checkout@v6
        with:
          repository: ${{ vars.TAP_REPO || 'bango97/homebrew-power-term' }}
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}

      - name: Update cask formula
        env:
          TAG: ${{ github.ref_name }}
          SOURCE_REPO: ${{ github.repository }}
        run: |
          V="${TAG#v}"

          # Download DMGs from the source repo's release and compute SHA256
          URL_AARCH64="https://github.com/${SOURCE_REPO}/releases/download/${TAG}/Power.Term_${V}_aarch64.dmg"
          URL_X64="https://github.com/${SOURCE_REPO}/releases/download/${TAG}/Power.Term_${V}_x64.dmg"

          curl -sLo aarch64.dmg "$URL_AARCH64"
          curl -sLo x64.dmg "$URL_X64"

          SHA_ARM=$(sha256sum aarch64.dmg | awk '{print $1}')
          SHA_INTEL=$(sha256sum x64.dmg | awk '{print $1}')

          echo "aarch64 SHA256: $SHA_ARM"
          echo "x86_64 SHA256: $SHA_INTEL"

          # Update version
          sed -i "s/version \".*\"/version \"$V\"/" Casks/power-term.rb

          # Update SHA256s
          sed -i "s|sha256 arm:   \".*\"|sha256 arm:   \"$SHA_ARM\"|" Casks/power-term.rb
          sed -i "s|sha256 intel: \".*\"|sha256 intel: \"$SHA_INTEL\"|" Casks/power-term.rb

          # Ensure URL pattern uses Power.Term_ naming (Tauri 2 default)
          if ! grep -q 'Power.Term_' Casks/power-term.rb; then
            sed -i 's|PowerTerm-#{version}-#{arch}|Power.Term_#{version}_#{arch}|' Casks/power-term.rb
          fi

          cat Casks/power-term.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/power-term.rb
          git diff --cached --quiet || git commit -m "chore: bump to ${{ github.ref_name }}"
          git push
